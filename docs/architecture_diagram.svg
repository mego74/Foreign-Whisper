<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px Arial, sans-serif; fill: #334155; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .box { stroke-width: 2; rx: 18; ry: 18; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 24; ry: 24; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" class="title">Foreign Whispers System Architecture</text>

  <rect x="40" y="90" width="240" height="560" class="group"/>
  <text x="160" y="122" text-anchor="middle" class="label">Frontend Layer</text>

  <rect x="70" y="155" width="180" height="90" fill="#dbeafe" stroke="#2563eb" class="box"/>
  <text x="160" y="188" text-anchor="middle" class="label">Next.js Studio</text>
  <text x="160" y="213" text-anchor="middle" class="text">Video selector</text>
  <text x="160" y="234" text-anchor="middle" class="text">Settings + player</text>

  <rect x="70" y="285" width="180" height="110" fill="#e0f2fe" stroke="#0284c7" class="box"/>
  <text x="160" y="318" text-anchor="middle" class="label">Pipeline UI</text>
  <text x="160" y="343" text-anchor="middle" class="text">Stage tracking</text>
  <text x="160" y="364" text-anchor="middle" class="text">Variant playback</text>

  <rect x="70" y="435" width="180" height="110" fill="#dcfce7" stroke="#16a34a" class="box"/>
  <text x="160" y="468" text-anchor="middle" class="label">Browser Output</text>
  <text x="160" y="493" text-anchor="middle" class="text">Dubbed MP4</text>
  <text x="160" y="514" text-anchor="middle" class="text">VTT captions</text>

  <rect x="320" y="90" width="300" height="560" class="group"/>
  <text x="470" y="122" text-anchor="middle" class="label">API Orchestration Layer</text>

  <rect x="355" y="155" width="230" height="90" fill="#ede9fe" stroke="#7c3aed" class="box"/>
  <text x="470" y="188" text-anchor="middle" class="label">FastAPI Backend</text>
  <text x="470" y="213" text-anchor="middle" class="text">/api/* routes</text>
  <text x="470" y="234" text-anchor="middle" class="text">Stage orchestration</text>

  <rect x="355" y="275" width="230" height="90" fill="#fae8ff" stroke="#c026d3" class="box"/>
  <text x="470" y="308" text-anchor="middle" class="label">Caching + Media Serve</text>
  <text x="470" y="333" text-anchor="middle" class="text">Artifacts in pipeline_data/api</text>
  <text x="470" y="354" text-anchor="middle" class="text">Video/audio/VTT endpoints</text>

  <rect x="355" y="395" width="230" height="120" fill="#fef3c7" stroke="#d97706" class="box"/>
  <text x="470" y="428" text-anchor="middle" class="label">Core Services</text>
  <text x="470" y="453" text-anchor="middle" class="text">Download</text>
  <text x="470" y="474" text-anchor="middle" class="text">Transcribe / Diarize / Translate</text>
  <text x="470" y="495" text-anchor="middle" class="text">TTS / Stitch</text>

  <rect x="660" y="90" width="500" height="270" class="group"/>
  <text x="910" y="122" text-anchor="middle" class="label">Inference and Library Layer</text>

  <rect x="690" y="155" width="200" height="90" fill="#fee2e2" stroke="#dc2626" class="box"/>
  <text x="790" y="188" text-anchor="middle" class="label">Whisper STT</text>
  <text x="790" y="213" text-anchor="middle" class="text">GPU service or local fallback</text>

  <rect x="930" y="155" width="200" height="90" fill="#fee2e2" stroke="#dc2626" class="box"/>
  <text x="1030" y="188" text-anchor="middle" class="label">Chatterbox TTS</text>
  <text x="1030" y="213" text-anchor="middle" class="text">GPU service or local fallback</text>

  <rect x="690" y="270" width="440" height="60" fill="#ecfccb" stroke="#65a30d" class="box"/>
  <text x="910" y="306" text-anchor="middle" class="label">foreign_whispers Python Library</text>

  <rect x="660" y="390" width="500" height="260" class="group"/>
  <text x="910" y="422" text-anchor="middle" class="label">Artifact and Output Layer</text>

  <rect x="690" y="455" width="180" height="135" fill="#f1f5f9" stroke="#64748b" class="box"/>
  <text x="780" y="488" text-anchor="middle" class="label">Intermediate Artifacts</text>
  <text x="780" y="513" text-anchor="middle" class="small">videos</text>
  <text x="780" y="534" text-anchor="middle" class="small">transcriptions</text>
  <text x="780" y="555" text-anchor="middle" class="small">diarizations</text>
  <text x="780" y="576" text-anchor="middle" class="small">translations</text>

  <rect x="950" y="455" width="180" height="135" fill="#f1f5f9" stroke="#64748b" class="box"/>
  <text x="1040" y="488" text-anchor="middle" class="label">Final Outputs</text>
  <text x="1040" y="513" text-anchor="middle" class="small">tts_audio</text>
  <text x="1040" y="534" text-anchor="middle" class="small">dubbed_videos</text>
  <text x="1040" y="555" text-anchor="middle" class="small">dubbed_captions</text>
  <text x="1040" y="576" text-anchor="middle" class="small">speaker WAVs</text>

  <line x1="250" y1="200" x2="355" y2="200" class="arrow"/>
  <line x1="250" y1="340" x2="355" y2="340" class="arrow"/>
  <line x1="585" y1="200" x2="690" y2="200" class="arrow"/>
  <line x1="585" y1="230" x2="930" y2="200" class="arrow"/>
  <line x1="585" y1="300" x2="690" y2="300" class="arrow"/>
  <line x1="585" y1="455" x2="690" y2="522" class="arrow"/>
  <line x1="870" y1="300" x2="870" y2="455" class="arrow"/>
  <line x1="1040" y1="590" x2="1040" y2="620" class="arrow"/>
  <line x1="950" y1="620" x2="250" y2="620" class="arrow"/>
  <line x1="250" y1="620" x2="250" y2="490" class="arrow"/>
</svg>
